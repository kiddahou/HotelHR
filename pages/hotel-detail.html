                .replaceAll("'", '&#039;');

            const metaHtml = (metaLines || []).map(line => `<p class="text-gray-500 text-sm">${line}</p>`).join('');
            const footerHtml = footerRight ? `<div class="mt-4 flex items-center justify-between"><span></span><span class="text-[var(--tiffany-dark)] font-bold">${footerRight}</span></div>` : '';

            return `
                <div class="bg-white rounded-2xl overflow-hidden card-shadow group border border-transparent hover:border-[var(--tiffany)] transition">
                    <div class="h-40 overflow-hidden relative">
                        <img src="${escapeHtml(image)}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="${escapeHtml(title)}" />
                        ${badgeHtml}
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-lg mb-1">${escapeHtml(title)}</h3>
                        ${subtitle ? `<p class="text-gray-600 text-sm mb-3">${escapeHtml(subtitle)}</p>` : ''}
                        ${metaHtml}
                        ${footerHtml}
                    </div>
                </div>
            `;
        }

        function dealCard(d) {
            return `
                <div class="border border-gray-100 rounded-2xl p-4 hover:border-[var(--tiffany)] transition">
                    <div class="flex items-center justify-between gap-2">
                        <p class="font-bold">${escapeHtml(d.title)}</p>
                        <span class="text-xs font-bold px-2 py-1 rounded bg-[var(--tiffany-pale)] text-[var(--tiffany-dark)]">${escapeHtml(d.badge || '優惠')}</span>
                    </div>
                    <p class="text-gray-500 text-sm mt-1">${escapeHtml(d.subtitle || '')}</p>
                    <p class="text-gray-400 text-xs mt-2">${escapeHtml(d.start)} ~ ${escapeHtml(d.end)}</p>
                </div>
            `;
        }

        function galleryItem(url) {
            return `
                <div class="bg-white rounded-xl overflow-hidden card-shadow">
                    <img src="${escapeHtml(url)}" class="w-full h-28 object-cover hover:scale-105 transition" alt="gallery" />
                </div>
            `;
        }

        function renderHotel(h) {
            document.title = `${h.name} - 飯店詳細頁 | HotelHR-1111`;

            els.hotelBreadcrumb.textContent = `探索飯店 / ${h.city} / ${h.name}`;
            els.hotelTitle.textContent = h.name;
            els.hotelSub.textContent = `${h.city}・${h.area}`;
            els.tag.textContent = h.tag;
            els.rating.textContent = `評分 ${Number(h.rating).toFixed(1)}`;

            els.heroImage.src = h.image;
            els.desc.textContent = h.desc;

            els.countRooms.textContent = (h.rooms || []).length;
            els.countRestaurants.textContent = (h.restaurants || []).length;
            els.countDishes.textContent = (h.dishes || []).length;
            els.countProducts.textContent = (h.products || []).length;

            els.deals.innerHTML = (h.deals || []).map(dealCard).join('') || '<p class="text-gray-500 text-sm">目前沒有優惠資訊</p>';

            els.rooms.innerHTML = (h.rooms || []).map(r => cardBase({
                image: r.image,
                badge: `${money(r.price)} / 晚`,
                title: r.name,
                subtitle: `${r.size}｜容納 ${r.capacity}`,
                metaLines: [(r.amenities || []).slice(0, 3).join('｜')]
            })).join('') || '<p class="text-gray-500 text-sm">目前沒有房型資料</p>';

            els.restaurants.innerHTML = (h.restaurants || []).map(x => cardBase({
                image: x.image,
                badge: x.type,
                title: x.name,
                subtitle: `${x.location}｜${x.hours}`,
                metaLines: [`餐廳類型：${x.type}`]
            })).join('') || '<p class="text-gray-500 text-sm">目前沒有餐廳資料</p>';

            els.dishes.innerHTML = (h.dishes || []).map(d => cardBase({
                image: d.image,
                badge: money(d.price),
                title: d.name,
                subtitle: d.restaurant,
                metaLines: [`辣度：${d.spicy}`]
            })).join('') || '<p class="text-gray-500 text-sm">目前沒有菜色資料</p>';

            els.products.innerHTML = (h.products || []).map(p => `
                <div class="bg-white rounded-2xl overflow-hidden card-shadow group border border-transparent hover:border-[var(--tiffany)] transition">
                    <div class="h-44 overflow-hidden relative">
                        <img src="${escapeHtml(p.image)}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="${escapeHtml(p.name)}" />
                        <div class="absolute top-3 left-3 bg-white/90 backdrop-blur px-2 py-1 rounded text-xs font-bold text-[var(--tiffany)]">${escapeHtml(p.tag)}</div>
                    </div>
                    <div class="p-5">
                        <div class="flex items-start justify-between gap-3">
                            <h3 class="font-bold text-lg mb-1">${escapeHtml(p.name)}</h3>
                            <span class="text-[var(--tiffany-dark)] font-bold">${money(p.price)}</span>
                        </div>
                        <p class="text-gray-600 text-sm mt-2 line-clamp-2">${escapeHtml(p.desc || '')}</p>
                    </div>
                </div>
            `).join('') || '<p class="text-gray-500 text-sm">目前沒有商品資料</p>';

            els.gallery.innerHTML = (h.gallery || []).map(galleryItem).join('') || '<p class="text-gray-500 text-sm">目前沒有圖片集</p>';

            // 目前影片使用示意背景，如未來要啟用可改為 iframe 來源
            els.videoHint.textContent = h.videoHint || '目前為示意影片區塊';
        }

        function init() {
            const id = getQueryParam('hotel') || 'h1';
            const h = hotels.find(x => x.id === id);

            if (!h) {
                els.notFound.classList.remove('hidden');
                return;
            }

            els.content.classList.remove('hidden');
            renderHotel(h);
        }

        // 搜尋功能實作（可展開）
        const navSearch = document.getElementById('navSearch');
        const navSearchToggle = document.getElementById('navSearchToggle');
        const navSearchPanel = document.getElementById('navSearchPanel');
        const navSearchClose = document.getElementById('navSearchClose');

        const searchInput = document.getElementById('hotelSearchInput');
        const searchDropdown = document.getElementById('searchDropdown');
        const searchResults = document.getElementById('searchResults');

        function openNavSearch() {
            if (!navSearchPanel) return;
            navSearchPanel.classList.remove('hidden');
            navSearchToggle?.setAttribute('aria-expanded', 'true');
            setTimeout(() => searchInput?.focus(), 0);
        }

        function closeNavSearch() {
            if (!navSearchPanel) return;
            navSearchPanel.classList.add('hidden');
            navSearchToggle?.setAttribute('aria-expanded', 'false');
            searchDropdown?.classList.add('hidden');
            if (searchInput) searchInput.value = '';
        }

        navSearchToggle?.addEventListener('click', (e) => {
            e.preventDefault();
            if (navSearchPanel?.classList.contains('hidden')) openNavSearch();
            else closeNavSearch();
        });

        navSearchClose?.addEventListener('click', (e) => {
            e.preventDefault();
            closeNavSearch();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeNavSearch();
        });

        searchInput?.addEventListener('input', (e) => {
            const term = e.target.value.trim().toLowerCase();
            if (!term) {
                searchDropdown.classList.add('hidden');
                return;
            }

            const filtered = hotels.filter(h =>
                h.name.toLowerCase().includes(term) ||
                h.city.toLowerCase().includes(term) ||
                h.tag.toLowerCase().includes(term)
            );

            if (filtered.length > 0) {
                searchResults.innerHTML = filtered.map(h => `
                    <div class="px-4 py-3 hover:bg-[var(--tiffany-pale)] cursor-pointer transition flex items-center gap-3" onclick="navigateToHotel('${h.id}')">
                        <img src="${h.image}" class="w-10 h-10 rounded-lg object-cover" alt="${h.name}">
                        <div>
                            <p class="font-bold text-sm text-gray-800">${escapeHtml(h.name)}</p>
                            <p class="text-xs text-gray-500">${escapeHtml(h.city)} · ${escapeHtml(h.tag)}</p>
                        </div>
                    </div>
                `).join('');
                searchDropdown.classList.remove('hidden');
            } else {
                searchResults.innerHTML = '<div class="px-4 py-3 text-sm text-gray-500">找不到相符的飯店</div>';
                searchDropdown.classList.remove('hidden');
            }
        });

        window.navigateToHotel = function(id) {
            const url = new URL(window.location.href);
            url.searchParams.set('hotel', id);
            window.history.pushState({}, '', url);

            // 收合搜尋 + 重新載入內容
            closeNavSearch();
            init();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 點擊外部：收合（若點到下拉選單或 panel 內則不收）
        document.addEventListener('click', (e) => {
            const t = e.target;
            if (!navSearch?.contains(t)) {
                closeNavSearch();
            }
        });

        init();
    </script>

</body>
</html>
