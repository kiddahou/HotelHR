        const els = {
            q: document.getElementById('q'),
            city: document.getElementById('city'),
            btnSearch: document.getElementById('btnSearch'),
            btnReset: document.getElementById('btnReset'),
            hotelListGrid: document.getElementById('hotelListGrid'),
            listHint: document.getElementById('listHint')
        };

        let currentHotelId = '';

        function money(n) {
            return new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', maximumFractionDigits: 0 }).format(n);
        }

        function escapeHtml(s) {
            return String(s)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function getHotelImages(h) {
            return {
                main: h.image,
                sub1: h.rooms && h.rooms[0] ? h.rooms[0].image : h.image,
                sub2: h.restaurants && h.restaurants[0] ? h.restaurants[0].image : h.image,
                sub3: h.dishes && h.dishes[0] ? h.dishes[0].image : h.image,
                sub4: h.products && h.products[0] ? h.products[0].image : h.image
            };
        }

        function renderHotelList(list) {
            els.hotelListGrid.innerHTML = list.map(h => {
                const images = getHotelImages(h);
                return `
                <a href="hotel-detail.html?hotel=${encodeURIComponent(h.id)}" class="hotel-card group bg-white rounded-2xl overflow-hidden card-shadow border-2 border-transparent hover:border-[var(--tiffany)] hover:shadow-lg transition-all cursor-pointer ${currentHotelId === h.id ? 'active' : ''}">
                    <!-- 一大圖 + 四小圖 -->
                    <div class="grid grid-cols-2 gap-1 p-2">
                        <!-- 左側大圖 -->
                        <div class="row-span-2 h-48 overflow-hidden rounded-xl relative">
                            <img src="${images.main}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" alt="${h.name}">
                            <div class="absolute top-2 left-2 bg-white/90 backdrop-blur px-2 py-1 rounded text-[10px] font-bold text-[var(--tiffany)]">${h.tag}</div>
                        </div>
                        <!-- 右側四小圖 -->
                        <div class="h-23 overflow-hidden rounded-lg">
                            <img src="${images.sub1}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="圖片1">
                        </div>
                        <div class="h-23 overflow-hidden rounded-lg">
                            <img src="${images.sub2}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="圖片2">
                        </div>
                        <div class="h-23 overflow-hidden rounded-lg">
                            <img src="${images.sub3}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="圖片3">
                        </div>
                        <div class="h-23 overflow-hidden rounded-lg relative">
                            <img src="${images.sub4}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="圖片4">
                            <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <span class="text-white text-xs font-medium">查看更多</span>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 pt-2">
                        <div class="flex items-center justify-between mb-1">
                            <h4 class="font-bold text-gray-800 line-clamp-1">${h.name}</h4>
                            <span class="text-[var(--tiffany)] font-bold text-sm">${h.rating}</span>
                        </div>
                        <p class="text-gray-500 text-xs flex items-center">
                            <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                            ${h.city} ${h.area}
                        </p>
                        <p class="text-gray-400 text-xs mt-2 line-clamp-1">${h.desc}</p>
                    </div>
                </a>
            `}).join('');

            els.listHint.textContent = `共 ${list.length} 家飯店符合您的需求`;
        }


        function searchAndRender() {
            const q = (els.q.value || '').trim().toLowerCase();
            const city = els.city.value;

            const filtered = hotels.filter(h => {
                const matchCity = !city || h.city === city;
                const matchQ = !q || [h.name, h.city, h.area, h.tag, h.desc].join(' ').toLowerCase().includes(q);
                return matchCity && matchQ;
            });

            renderHotelList(filtered);
            renderHotelOptions(filtered);

            if (filtered.length > 0 && !currentHotelId) {
                // 不自動選擇，讓使用者點擊
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setActiveTab(btn.getAttribute('data-tab'));
            });
        });

        els.btnSearch.addEventListener('click', searchAndRender);
        els.q.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchAndRender();
        });
        els.city.addEventListener('change', searchAndRender);

        els.btnReset.addEventListener('click', () => {
            els.q.value = '';
            els.city.value = '';
            currentHotelId = '';
            renderHotelList(hotels);
        });

        // 移除 Tabs 相關事件監聽（因為已經移除這些元素）
        // 如果還有 tab 按鈕才綁定事件
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-btn').forEach(b => {
                    const isActive = b.getAttribute('data-tab') === tab;
                    b.classList.toggle('bg-[var(--tiffany)]', isActive);
                    b.classList.toggle('text-white', isActive);
                    b.classList.toggle('bg-white', !isActive);
                    b.classList.toggle('border-gray-200', !isActive);
                    b.classList.toggle('shadow-lg', isActive);
                });
                document.querySelectorAll('.tab-panel').forEach(p => {
                    p.classList.toggle('hidden', p.id !== `panel-${tab}`);
                });
            });
        });

        // init
        renderHotelList(hotels);
    </script>
